<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escape Room - Narrativa Lineal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* ================= ESTILOS GLOBALES ================= */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
        }

        :root {
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-red: #ff3131;
            --neon-yellow: #fff01f;
        }

        /* ================= VIDEO LAYER ================= */
        #video-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s; }
        .visible { opacity: 1; z-index: 2; }
        .hidden { opacity: 0; z-index: 1; }

        /* ================= PANTALLA DE INICIO (START BUTTON) ================= */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.4);
        }
        .big-start-btn {
            padding: 20px 50px; font-size: 2rem; background: rgba(0,0,0,0.8);
            color: var(--neon-blue); border: 2px solid var(--neon-blue);
            font-family: 'Orbitron'; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 30px var(--neon-blue); transition: 0.3s;
            animation: pulse 2s infinite;
        }
        .big-start-btn:hover { background: var(--neon-blue); color: #000; }
        @keyframes pulse { 0% { box-shadow: 0 0 20px var(--neon-blue); } 50% { box-shadow: 0 0 50px var(--neon-blue); } 100% { box-shadow: 0 0 20px var(--neon-blue); } }

        /* ================= ESCENA 1: VOTACIÓN (VOZ) ================= */
        #scene-voice {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            background: rgba(0, 0, 0, 0.2); /* Fondo más sutil para ver video */
            flex-direction: column; justify-content: flex-end; align-items: center;
        }
        .overlay-title { position: absolute; top: 10%; width: 100%; text-align: center; font-size: 3rem; color: #fff; text-shadow: 0 0 20px var(--neon-blue); margin: 0; }
        .winner-text { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--neon-pink); z-index: 30; }
        .stage { display: flex; width: 80%; height: 60vh; gap: 50px; justify-content: center; align-items: flex-end; margin-bottom: 50px; }
        .team-column { flex: 1; height: 100%; background: rgba(20, 20, 30, 0.6); border: 2px solid rgba(255,255,255,0.3); border-radius: 15px; position: relative; display: flex; flex-direction: column; justify-content: flex-end; }
        .active-turn { border-color: var(--neon-blue); box-shadow: 0 0 50px var(--neon-blue); }
        .winner-col { border-color: var(--neon-pink); box-shadow: 0 0 80px var(--neon-pink); transform: scale(1.05); }
        .score-display { position: absolute; top: -80px; width: 100%; text-align: center; font-size: 5rem; font-weight: 900; color: #fff; text-shadow: 2px 2px 10px #000; }
        .bar { width: 100%; height: 0%; transition: height 0.1s linear; }
        #bar-a { background: linear-gradient(to top, #003b00, var(--neon-green)); border-top: 4px solid var(--neon-green); }
        #bar-b { background: linear-gradient(to top, #4a0000, var(--neon-red)); border-top: 4px solid var(--neon-red); }
        .label { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 2rem; font-weight: bold; color: white; text-shadow: 0 0 10px black; }
        #timer-overlay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 15rem; font-weight: 900; color: white; text-shadow: 0 0 50px var(--neon-blue); display: none; z-index: 100; }

        /* ================= ESCENA 2: MEMORY HACK ================= */
        #scene-memory {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            flex-direction: column; justify-content: center; align-items: center;
        }
        #memory-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
            background: rgba(0,0,0,0.8); padding: 30px; border: 2px solid var(--neon-yellow);
            border-radius: 20px; box-shadow: 0 0 50px rgba(255, 240, 31, 0.15);
        }
        .mem-btn {
            width: 120px; height: 120px; border: 2px solid #555; background: #222;
            border-radius: 12px; cursor: pointer; transition: 0.1s;
        }
        .mem-lit { filter: brightness(2.0); box-shadow: 0 0 40px currentColor; border-color: white !important; }
        #mem-status { margin-top: 40px; font-size: 2.5rem; color: var(--neon-yellow); text-shadow: 0 0 15px var(--neon-yellow); text-align: center; height: 50px; }

        /* ================= PANEL DE CONTROL GM ================= */
        #gm-controls {
            position: fixed; bottom: 10px; right: 10px; z-index: 999;
            background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; border: 1px solid #555;
            display: flex; flex-direction: column; gap: 10px; min-width: 220px;
        }
        #gm-controls h4 { margin: 0 0 10px 0; color: #aaa; font-size: 12px; text-transform: uppercase; }
        .control-row { display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 8px 12px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; border: 1px solid #777; background: #333; color: #fff; border-radius: 4px; font-size: 0.8rem; flex: 1; }
        button:hover { background: #555; border-color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-green { border-color: var(--neon-green); color: var(--neon-green); }
        .btn-red { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-yellow { border-color: var(--neon-yellow); color: var(--neon-yellow); }
        .btn-orange { border-color: #ff8800; color: #ff8800; }

        /* Estados del panel */
        .ctrl-scene-1, .ctrl-scene-2, .ctrl-transition { display: none; }
    </style>
</head>
<body>

    <div id="video-layer">
        <video id="video1" class="visible" playsinline muted></video>
        <video id="video2" class="hidden" playsinline muted></video>
    </div>

    <div id="start-screen">
        <button class="big-start-btn" onclick="startMission1()">INICIAR MISIÓN 1</button>
    </div>

    <div id="scene-voice">
        <h2 class="overlay-title">¡DECISIÓN DEL PÚBLICO!</h2>
        <div id="winner-text-1" class="winner-text"></div>
        <div id="timer-overlay">5</div>
        <div class="stage">
            <div class="team-column" id="col-a">
                <div id="score-a" class="score-display">0</div> 
                <div class="label">OPCIÓN A</div>
                <div id="bar-a" class="bar"></div>
            </div>
            <div class="team-column" id="col-b">
                <div id="score-b" class="score-display">0</div>
                <div class="label">OPCIÓN B</div>
                <div id="bar-b" class="bar"></div>
            </div>
        </div>
    </div>

    <div id="scene-memory">
        <h2 class="overlay-title" style="color:var(--neon-yellow); text-shadow: 0 0 20px var(--neon-yellow);">HACKEO DEL SISTEMA</h2>
        <div id="memory-grid"></div>
        <div id="mem-status">ESPERANDO SECUENCIA...</div>
    </div>

    <div id="gm-controls">
        <h4>Panel de Operador</h4>
        
        <div class="control-row">
            <button onclick="unlockAudio()">🔊 Activar Audio (Paso 1)</button>
        </div>
        <hr style="width:100%; border-color:#444;">

        <div class="ctrl-scene-1">
            <div class="control-row">
                <button onclick="startCountdown('A')" class="btn-green" id="btn-a">Gritos A</button>
                <button onclick="startCountdown('B')" class="btn-red" id="btn-b" disabled>Gritos B</button>
            </div>
            <div class="control-row" style="margin-top:10px;">
                <label style="color:white; font-size:10px;">Sensibilidad:</label>
                <input type="range" min="0.5" max="5.0" step="0.1" value="1.5" oninput="updateSensitivity(this.value)">
            </div>
            <button onclick="resetVoiceGame()" style="margin-top:5px; width:100%">Reiniciar Votación</button>
        </div>

        <div class="ctrl-transition">
            <p style="color:#aaa; font-size:10px; margin:0;">Misión 2 Cargada en Background</p>
            <button onclick="revealGame2()" class="btn-orange">⬇ MOSTRAR INTERFAZ HACKEO</button>
        </div>

        <div class="ctrl-scene-2">
            <div class="control-row">
                <button onclick="startMemoryRound(3)" class="btn-yellow">Nivel 1 (3)</button>
                <button onclick="startMemoryRound(5)" class="btn-yellow">Nivel 2 (5)</button>
            </div>
            <div class="control-row" style="margin-top:5px">
                 <button onclick="resolveMemory(true)" class="btn-green">Forzar Ganar</button>
                 <button onclick="resolveMemory(false)" class="btn-red">Forzar Perder</button>
            </div>
            <button onclick="hideGame2UI()" style="margin-top:5px; width:100%">Ocultar Interfaz</button>
        </div>
    </div>

    <script>
        // ================= CONFIGURACIÓN =================
        const CLIPS = {
            // Intro inicial y loop del juego 1
            start_loop: "loop.mp4", 
            
            // Finales Juego 1
            winA: "A.mp4",
            winB: "B.mp4",
            
            // Juego 2
            loop2: "loop_hack.mp4",
            win2:  "access.mp4",
            fail2: "denied.mp4"
        };

        // Estado del Sistema
        let currentStage = 'START'; // START, GAME1, TRANSITION, GAME2
        let activePlayer = document.getElementById('video1');
        let hiddenPlayer = document.getElementById('video2');

        // ================= INICIO =================
        // Al cargar, ponemos el video loop inicial pero esperamos clic para audio y lógica
        window.onload = () => {
             activePlayer.src = CLIPS.start_loop;
             activePlayer.loop = true;
             activePlayer.play();
             // Añadimos el listener mágico para detectar finales de video
             activePlayer.addEventListener('ended', onVideoEnded);
             hiddenPlayer.addEventListener('ended', onVideoEnded);
        };

        function startMission1() {
            // 1. Quitar pantalla de inicio
            document.getElementById('start-screen').style.display = 'none';
            // 2. Mostrar interfaz Juego 1
            document.getElementById('scene-voice').style.display = 'flex';
            // 3. Activar controles GM
            document.querySelector('.ctrl-scene-1').style.display = 'block';
            
            currentStage = 'GAME1';
            unlockAudio(); // Intentar activar audio aquí también
        }

        // ================= MOTOR DE VIDEO & TRANSICIONES =================
        function smoothTransition(videoUrl, loop = false) {
            console.log("Cambiando a video:", videoUrl);
            hiddenPlayer.src = videoUrl;
            hiddenPlayer.loop = loop;
            
            let playPromise = hiddenPlayer.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    hiddenPlayer.classList.remove('hidden'); hiddenPlayer.classList.add('visible');
                    activePlayer.classList.remove('visible'); activePlayer.classList.add('hidden');
                    setTimeout(() => { 
                        activePlayer.pause(); 
                        let temp = activePlayer; activePlayer = hiddenPlayer; hiddenPlayer = temp;
                    }, 100);
                });
            }
        }

        // === DETECTOR DE FIN DE VIDEO (LA CLAVE) ===
        function onVideoEnded(e) {
            const src = e.target.src;
            
            // Si termina el video de GANA A o GANA B -> Cargar Loop Juego 2
            if (src.includes(CLIPS.winA) || src.includes(CLIPS.winB)) {
                console.log("Final de Juego 1 detectado. Cargando Loop Juego 2...");
                
                // Transición automática al video de fondo del juego 2
                smoothTransition(CLIPS.loop2, true);
                
                // Cambiar controles GM al modo "Esperando lanzar Hackeo"
                document.querySelector('.ctrl-scene-1').style.display = 'none';
                document.querySelector('.ctrl-transition').style.display = 'block';
                currentStage = 'TRANSITION';
            }
            
            // Si termina el video de Ganar/Perder Juego 2 -> Nada (se queda quieto o loop)
        }

        // ================= LOGICA JUEGO 1 (VOZ) =================
        let audioContext, analyser, microphone, javascriptNode;
        let isListening = false; let currentTeam = null;
        let scoreA = 0; let scoreB = 0; let SENSITIVITY = 1.5;

        async function unlockAudio() {
            try {
                if (!audioContext) {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    microphone = audioContext.createMediaStreamSource(stream);
                    javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);
                    analyser.smoothingTimeConstant = 0.6; analyser.fftSize = 1024;
                    microphone.connect(analyser); analyser.connect(javascriptNode); javascriptNode.connect(audioContext.destination);
                    javascriptNode.onaudioprocess = processAudio;
                } else if (audioContext.state === 'suspended') audioContext.resume();
                console.log("Audio OK");
            } catch (e) { console.error(e); alert("Habilita el micrófono"); }
        }

        function updateSensitivity(val) { SENSITIVITY = parseFloat(val); }

        function processAudio() {
            if (currentStage !== 'GAME1' || !isListening || !currentTeam) return;
            const array = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(array);
            let values = 0; for (let i = 0; i < array.length; i++) values += array[i];
            let volume = Math.round((values / array.length) * SENSITIVITY); 
            if (volume > 100) volume = 100;

            if (volume > 80) document.getElementById('scene-voice').style.transform = `translate(${Math.random()*4-2}px, ${Math.random()*4-2}px)`;
            else document.getElementById('scene-voice').style.transform = 'none';

            const teamSlug = currentTeam.toLowerCase();
            document.getElementById(`bar-${teamSlug}`).style.height = volume + "%";
            document.getElementById(`score-${teamSlug}`).innerText = volume;

            if (currentTeam === 'A' && volume > scoreA) scoreA = volume;
            if (currentTeam === 'B' && volume > scoreB) scoreB = volume;
        }

        function startCountdown(team) {
            document.getElementById('btn-a').disabled = true; document.getElementById('btn-b').disabled = true;
            document.querySelectorAll('.team-column').forEach(c => c.classList.remove('active-turn'));
            document.getElementById(`col-${team.toLowerCase()}`).classList.add('active-turn');
            const timerDisplay = document.getElementById('timer-overlay');
            timerDisplay.style.display = 'block';
            let countdown = 3; timerDisplay.innerText = countdown;
            let prepInterval = setInterval(() => {
                countdown--;
                if(countdown > 0) timerDisplay.innerText = countdown; 
                else { clearInterval(prepInterval); timerDisplay.innerText = "¡GRITEN!"; startRecording(team); }
            }, 800);
        }

        function startRecording(team) {
            isListening = true; currentTeam = team;
            let timeLeft = 4;
            let gameInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft < 0) { clearInterval(gameInterval); stopRecording(team); }
            }, 1000);
        }

        function stopRecording(team) {
            isListening = false;
            document.getElementById('timer-overlay').style.display = 'none';
            const finalScore = (team === 'A') ? scoreA : scoreB;
            document.getElementById(`bar-${team.toLowerCase()}`).style.height = finalScore + "%";
            document.getElementById(`score-${team.toLowerCase()}`).innerText = finalScore;

            if (team === 'A') {
                document.getElementById('btn-b').disabled = false;
                document.getElementById(`col-a`).classList.remove('active-turn');
            } else {
                document.getElementById(`col-b`).classList.remove('active-turn');
                declareVoiceWinner();
            }
            currentTeam = null;
        }

        function declareVoiceWinner() {
            const winnerText = document.getElementById('winner-text-1');
            let winner = (scoreA >= scoreB) ? 'A' : 'B';
            winnerText.innerText = `¡GANA OPCIÓN ${winner}!`;
            document.getElementById(`col-${winner.toLowerCase()}`).classList.add('winner-col');
            launchConfetti(winner === 'A' ? '#39ff14' : '#ff3131');

            setTimeout(() => {
                // Ocultar interfaz y lanzar video ganador
                document.getElementById('scene-voice').style.display = 'none';
                if (winner === 'A') smoothTransition(CLIPS.winA, false); // NO LOOP
                else smoothTransition(CLIPS.winB, false); // NO LOOP
                // NOTA: Cuando este video acabe, se dispara 'onVideoEnded' y carga el loop del juego 2
            }, 3000);
        }
        
        function resetVoiceGame() {
            scoreA = 0; scoreB = 0;
            document.getElementById('bar-a').style.height = "0%"; document.getElementById('bar-b').style.height = "0%";
            document.getElementById('score-a').innerText = "0"; document.getElementById('score-b').innerText = "0";
            document.getElementById('winner-text-1').innerText = "";
            document.getElementById('btn-a').disabled = false; document.getElementById('btn-b').disabled = true;
            document.querySelectorAll('.team-column').forEach(c => c.classList.remove('active-turn', 'winner-col'));
            document.getElementById('scene-voice').style.display = 'flex';
        }

        // ================= LOGICA JUEGO 2 (MEMORIA) =================
        function revealGame2() {
            // Acción Manual del GM: Mostrar interfaz
            document.querySelector('.ctrl-transition').style.display = 'none';
            document.querySelector('.ctrl-scene-2').style.display = 'block';
            document.getElementById('scene-memory').style.display = 'flex';
            currentStage = 'GAME2';
            initMemoryGrid();
        }

        function hideGame2UI() {
            document.getElementById('scene-memory').style.display = 'none';
        }

        // (Lógica Memory idéntica a la anterior)
        let pattern = []; let playerIndex = 0; let isPlayerTurn = false;
        const gridColors = ['#ff00ff', '#00f3ff', '#39ff14', '#fff01f', '#ff3131', '#ffffff', '#aa00ff', '#ff8800', '#00ffaa'];

        function initMemoryGrid() {
            const grid = document.getElementById('memory-grid'); grid.innerHTML = '';
            for(let i=0; i<9; i++) {
                let btn = document.createElement('div'); btn.className = 'mem-btn'; btn.id = `mem-${i}`;
                btn.style.borderColor = gridColors[i]; btn.style.backgroundColor = 'rgba(0,0,0,0.5)';
                btn.onclick = () => handleMemoryClick(i); grid.appendChild(btn);
            }
            document.getElementById('mem-status').innerText = "SISTEMA LISTO";
            document.getElementById('mem-status').style.color = "var(--neon-yellow)";
        }

        function startMemoryRound(length) {
            pattern = []; for(let i=0; i<length; i++) pattern.push(Math.floor(Math.random() * 9));
            playerIndex = 0; isPlayerTurn = false;
            document.getElementById('mem-status').innerText = "OBSERVA EL PATRÓN...";
            let i = 0;
            const interval = setInterval(() => {
                activateButton(pattern[i]); i++;
                if (i >= pattern.length) {
                    clearInterval(interval); isPlayerTurn = true;
                    setTimeout(() => { document.getElementById('mem-status').innerText = "¡REPITE LA SECUENCIA!"; document.getElementById('mem-status').style.color = "#fff"; }, 500);
                }
            }, 800);
        }

        function activateButton(index) {
            const btn = document.getElementById(`mem-${index}`);
            btn.classList.add('mem-lit'); btn.style.backgroundColor = gridColors[index];
            setTimeout(() => { btn.classList.remove('mem-lit'); btn.style.backgroundColor = 'rgba(0,0,0,0.5)'; }, 400);
        }

        function handleMemoryClick(index) {
            if (!isPlayerTurn) return;
            activateButton(index);
            if (index === pattern[playerIndex]) {
                playerIndex++;
                if (playerIndex === pattern.length) { isPlayerTurn = false; resolveMemory(true); }
            } else { isPlayerTurn = false; resolveMemory(false); }
        }

        function resolveMemory(win) {
            const status = document.getElementById('mem-status');
            if (win) { status.innerText = "ACCESO CONCEDIDO"; status.style.color = "var(--neon-green)"; launchConfetti('#39ff14'); }
            else { status.innerText = "ACCESO DENEGADO"; status.style.color = "var(--neon-red)"; }
            
            setTimeout(() => {
                document.getElementById('scene-memory').style.display = 'none';
                if(win) smoothTransition(CLIPS.win2, false); else smoothTransition(CLIPS.fail2, false);
            }, 1500);
        }

        function launchConfetti(colorHex) { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: [colorHex, '#ffffff'] }); }
    </script>
</body>
</html>
