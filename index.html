<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Misiones Fotográficas DDT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Landing Page Inicial -->
  <div id="landing" class="landing-page" onclick="iniciarAlbum()">
    <div class="landing-content">
        <h1 class="display-4">Misiones DDT</h1>
        <p class="lead">Toca la pantalla y completa tu álbum de experiencia.</p>
        <div class="album-icon-container">
            <span class="album-icon-text">📸 Iniciar</span>
        </div>
    </div>
  </div>

  <!-- Contenido Principal -->
  <div id="contenido" class="hidden container">
    <h1 class="text-center">Tu Álbum DDT</h1>
    
    <div id="laminas" class="grid-row">
      <!-- Las 3 tarjetas se generan aquí con JS -->
    </div>
    
    <div class="actions">
      <button id="btn-share" class="btn btn-primary" onclick="subirFotosAlServidor()">
        ☁️ Enviar mis fotos 
      </button>
    </div>
  </div>

  <!-- Modal de Cámara -->
  <div id="camera-modal" class="modal hidden">
    <div class="modal-content">
      <h5 id="titulo-lamina" class="modal-title"></h5>
      
      <video id="video" autoplay playsinline></video>
      
      <button id="switch-camera" class="btn btn-secondary btn-sm" onclick="cambiarCamara()">
        🔄 Cambiar Cámara
      </button>
      
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="capturarFoto()">📷 Capturar</button>
        <label class="btn btn-outline">
          Galería
          <input type="file" accept="image/*" onchange="subirDesdeGaleria(event)" class="hidden" />
        </label>
      </div>

      <button class="modal-close" onclick="cerrarModal()">&times;</button>
    </div>
  </div>

  <!-- CONFIGURACIÓN DE FIREBASE 10.8.0 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    // Reemplaza con tus credenciales
    const firebaseConfig = {
      apiKey: "AIzaSyBP5D1AtaIcklOFJiKnEXKilgsz5-363RE",
      authDomain: "veltis-data1.firebaseapp.com",
      projectId: "veltis-data1",
      storageBucket: "veltis-data1.firebasestorage.app", 
      messagingSenderId: "607614671540",
      appId: "1:607614671540:web:8118954f681910ecf995e1"
    };

    const app = initializeApp(firebaseConfig);
    
    window.db = getFirestore(app);
    window.storage = getStorage(app);
    window.dbCollection = collection;
    window.dbAddDoc = addDoc;
    window.dbTimestamp = serverTimestamp;
    window.sRef = ref;
    window.sUpload = uploadString;
    window.sGetUrl = getDownloadURL;
    
    console.log("🔥 Firebase conectado en modo DDT");
  </script>

  <script src="script.js" defer></script>
</body>
</html>
