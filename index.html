<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Misiones Fotográficas DDT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="camera-flash" class="flash-overlay hidden"></div>

  <div id="landing" class="landing-page" onclick="iniciarAlbum()">
    <div class="album-icon-container glass-effect">
        📸 COMENZAR
    </div>
  </div>

  <div id="contenido" class="hidden container">
    <div id="laminas" class="grid-row"></div>
    
    <div class="actions">
      <button id="btn-share" class="btn btn-primary glass-effect" onclick="subirFotosAlServidor()">
        ☁️ Enviar mis fotos 
      </button>
    </div>
  </div>

  <div id="camera-modal" class="modal hidden">
    <div class="modal-content glass-modal">
      <h5 id="titulo-lamina" class="modal-title"></h5>
      <video id="video" autoplay playsinline></video>
      <button id="switch-camera" class="btn btn-secondary btn-sm" onclick="cambiarCamara()">🔄 Cambiar Cámara</button>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="capturarFoto()">📷 Capturar</button>
        <label class="btn btn-outline">
          Galería
          <input type="file" accept="image/*" onchange="subirDesdeGaleria(event)" class="hidden" />
        </label>
      </div>
      <button class="modal-close" onclick="cerrarModal()">&times;</button>
    </div>
  </div>

  <div id="success-modal" class="modal hidden">
    <div class="modal-content success-content glass-modal">
      <div class="success-icon">🏆</div>
      <h1 class="modal-title" style="font-size: 1.8rem; text-shadow: 0 0 10px #EC0000;">¡MISIONES COMPLETADAS!</h1>
      <p style="color: #ccc; margin-bottom: 25px;">Tus fotos ya están en la pantalla principal del evento.</p>
      <button class="btn btn-primary" onclick="location.reload()">Empezar Nuevo Álbum</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBP5D1AtaIcklOFJiKnEXKilgsz5-363RE",
      authDomain: "veltis-data1.firebaseapp.com",
      projectId: "veltis-data1",
      storageBucket: "veltis-data1.firebasestorage.app", 
      messagingSenderId: "607614671540",
      appId: "1:607614671540:web:8118954f681910ecf995e1"
    };

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
    window.storage = getStorage(app);
    window.dbCollection = collection;
    window.dbAddDoc = addDoc;
    window.dbTimestamp = serverTimestamp;
    window.sRef = ref;
    window.sUpload = uploadString;
    window.sGetUrl = getDownloadURL;
  </script>
  <script src="script.js" defer></script>
</body>
</html>
