<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor DDT Carrusel</title>
    <style>
        body {
            background: radial-gradient(circle at bottom center, #4a0000 0%, #0a0a0a 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        header {
            text-align: center;
            padding: 30px;
            z-index: 10;
        }
        
        h1 {
            margin: 0;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(236,0,0,0.8);
            font-size: 3rem;
            color: #fff;
        }

        .carousel-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 50px 50px -50px #000, inset 0 -50px 50px -50px #000;
        }

        .carousel-track {
            display: flex;
            gap: 60px;
            padding: 0 50vw; 
            animation: scroll-carousel 40s linear infinite;
        }

        .carousel-track:hover {
            animation-play-state: paused;
        }

        @keyframes scroll-carousel {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .photo-card {
            flex: 0 0 400px; 
            height: 533px; 
            background: #111;
            border: 5px solid #fff;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-box-reflect: below 15px linear-gradient(transparent, transparent, rgba(0,0,0,0.4));
        }

        .photo-card:hover {
            transform: scale(1.1) translateY(-20px);
            z-index: 100;
            border-color: #EC0000;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .category-tag {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: #EC0000;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(236,0,0,0.6);
            white-space: nowrap;
            z-index: 10;
        }

        .photo-card.new-entry {
            animation: pop-in 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop-in {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>EXPERIENCIA DDT EN VIVO</h1>
    </header>

    <div class="carousel-container">
        <div id="carousel-track" class="carousel-track">
            <!-- JS -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBP5D1AtaIcklOFJiKnEXKilgsz5-363RE",
            authDomain: "veltis-data1.firebaseapp.com",
            projectId: "veltis-data1",
            storageBucket: "veltis-data1.firebasestorage.app",
            messagingSenderId: "607614671540",
            appId: "1:607614671540:web:8118954f681910ecf995e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const track = document.getElementById('carousel-track');
        let displayedIds = new Set();

        const q = query(collection(db, "DDT santander"), orderBy("fecha", "desc"), limit(20));

        onSnapshot(q, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const foto = change.doc.data();
                    const docId = change.doc.id;

                    if (!displayedIds.has(docId)) {
                        displayedIds.add(docId);
                        
                        const div = document.createElement('div');
                        div.className = 'photo-card new-entry';
                        div.innerHTML = `
                            <img src="${foto.url_foto}" alt="Experiencia DDT" loading="lazy">
                            <div class="category-tag">${foto.categoria}</div>
                        `;
                        
                        track.insertBefore(div, track.firstChild);
                    }
                }
            });
        });
    </script>
</body>
</html>
