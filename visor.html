<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Oficial DDT</title>
    <style>
        body {
            background-color: #000;
            background-image: url('visor.png');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* --- CONTENEDOR 1: MODO CARRUSEL FLOW --- */
        .carousel-container {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            top: 220px; 
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        .carousel-track {
            display: flex;
            gap: 50px;
            padding: 0 50vw; 
            will-change: transform;
            animation: scroll-carrusel 45s linear infinite; 
        }
        @keyframes scroll-carrusel {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .photo-card {
            flex: 0 0 350px; 
            height: 466px; 
            background: #111;
            border: 5px solid #fff;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        .photo-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        /* --- CONTENEDOR 2: MODO MOSAICO MASIVO --- */
        .mosaic-container {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            top: 260px; 
            overflow-y: auto;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            box-sizing: border-box;
        }
        .mosaic-card {
            background: #111;
            border: 2px solid #fff;
            border-radius: 8px;
            aspect-ratio: 3/4;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: popInMosaico 0.5s ease-out forwards;
        }
        .mosaic-card img {
            width: 100%; height: 100%; object-fit: cover;
        }
        @keyframes popInMosaico {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .category-tag {
            position: absolute;
            bottom: -15px; left: 50%;
            transform: translateX(-50%);
            background: #EC0000;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(236,0,0,0.6);
            white-space: nowrap;
            z-index: 10;
        }

        /* --- CONTENEDOR 3: LA RULETA GANADORA --- */
        .sorteo-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .ruleta-box {
            width: 450px;
            height: 600px;
            border: 8px solid #EC0000;
            border-radius: 20px;
            box-shadow: 0 0 50px #EC0000;
            background: #111;
            overflow: hidden;
            position: relative;
        }
        .ruleta-box img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .sorteo-title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 20px #EC0000;
            margin-bottom: 30px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="carrusel-view" class="carousel-container"><div id="carousel-track" class="carousel-track"></div></div>
    <div id="mosaico-view" class="mosaic-container hidden"></div>

    <div id="sorteo-view" class="sorteo-overlay hidden">
        <div class="sorteo-title" id="sorteo-txt">🎰 SELECCIONANDO GANADOR 🎰</div>
        <div class="ruleta-box"><img id="ruleta-img" src="" alt="Sorteo"></div>
    </div>

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let baseDeDatosMaster = []; 
        let colaDeEspera = [];      
        let fotosEnPantalla = [];   
        
        let configActual = { vista: "carrusel", filtro: "todos", lastSorteoTimestamp: 0, sorteoActivo: false };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTick(freq = 600, duration = 0.05) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        function playWinnerSound() {
            try {
                [440, 554.37, 659.25].forEach((freq, i) => { 
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);
                    osc.start(audioCtx.currentTime + (i * 0.15));
                    osc.stop(audioCtx.currentTime + 3);
                });
            } catch(e){}
        }

        // ==========================================
        // 🔥 NUEVO HELPER DE FILTRADO INTELIGENTE 🔥
        // ==========================================
        function fotoPasaFiltro(foto) {
            if (!configActual.filtro || configActual.filtro === "todos") return true;
            
            // Convertimos ambos a minúsculas y quitamos espacios para evitar errores humanos
            const filtroNorm = configActual.filtro.trim().toLowerCase();
            const catNorm = (foto.categoria || "").trim().toLowerCase();
            
            // Busca coincidencias parciales (ej: "mi selfie" coincidirá con "1. Mi Selfie")
            return catNorm.includes(filtroNorm) || filtroNorm.includes(catNorm);
        }

        // --- LISTENER DEL ADMIN ---
        onSnapshot(doc(db, "DDT_config", "estado"), (snapshot) => {
            if (!snapshot.exists()) return;
            const data = snapshot.data();
            
            if(data.filtro !== configActual.filtro) {
                configActual.filtro = data.filtro;
                ejecutarFiltroRemoto();
            }

            if(data.vista !== configActual.vista) {
                configActual.vista = data.vista;
                document.getElementById('carrusel-view').classList.toggle('hidden', data.vista !== 'carrusel');
                document.getElementById('mosaico-view').classList.toggle('hidden', data.vista !== 'mosaico');
                ejecutarFiltroRemoto();
            }

            if(data.sorteoActivo === false && configActual.sorteoActivo === true) {
                configActual.sorteoActivo = false;
                document.getElementById('sorteo-view').classList.add('hidden');
            }

            if(data.triggerSorteo && data.triggerSorteo !== configActual.lastSorteoTimestamp) {
                configActual.lastSorteoTimestamp = data.triggerSorteo;
                configActual.sorteoActivo = true;
                iniciarMecanicaSorteo();
            }
        });

        // --- LISTENER DE FOTOS ---
        const qPhotos = query(collection(db, "DDT santander"), orderBy("fecha", "desc"), limit(100));
        onSnapshot(qPhotos, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const foto = change.doc.data();
                    if (!baseDeDatosMaster.some(f => f.url_foto === foto.url_foto)) {
                        baseDeDatosMaster.push(foto); 
                        colaDeEspera.push(foto);     
                    }
                }
            });
        });

        // --- PEAJE INTELIGENTE ---
        setInterval(() => {
            if (colaDeEspera.length > 0 && configActual.sorteoActivo === false && configActual.vista === 'carrusel') {
                const fotoParaInyectar = colaDeEspera.shift(); 
                
                // Aplicamos el filtro inteligente
                if (!fotoPasaFiltro(fotoParaInyectar)) return;
                
                inyectarFotoAlDOM(fotoParaInyectar);
            }
        }, 2000); 

        function inyectarFotoAlDOM(foto) {
            const track = document.getElementById('carousel-track');
            const div = document.createElement('div');
            div.className = 'photo-card new-entry';
            div.innerHTML = `
                <img src="${foto.url_foto}" alt="DDT">
                <div class="category-tag">${foto.categoria}</div>
            `;
            
            track.appendChild(div);
            fotosEnPantalla.push(div);

            if (fotosEnPantalla.length > 40) {
                const fotoVieja = fotosEnPantalla.shift();
                fotoVieja.remove();
            }
        }

        function ejecutarFiltroRemoto() {
            const track = document.getElementById('carousel-track');
            const mosaicoGrid = document.getElementById('mosaico-view');
            track.innerHTML = ''; mosaicoGrid.innerHTML = ''; fotosEnPantalla = [];

            // Usamos el filtro inteligente para reconstruir la vista
            const fotosFiltradas = baseDeDatosMaster.filter(fotoPasaFiltro);

            if (configActual.vista === 'carrusel') {
                fotosFiltradas.slice(0, 15).reverse().forEach(f => inyectarFotoAlDOM(f));
            } else {
                fotosFiltradas.slice(0, 80).forEach(f => {
                    const cell = document.createElement('div');
                    cell.className = 'mosaic-card';
                    cell.innerHTML = `<img src="${f.url_foto}" loading="lazy">`;
                    mosaicoGrid.appendChild(cell);
                });
            }
        }

        // --- MOTOR DE LA RULETA ---

            const fotosParaSorteo = baseDeDatosMaster.filter(fotoPasaFiltro);

                alert("No hay fotos registradas bajo este filtro para realizar el sorteo.");
                return;
            }

            const ruletaImg = document.getElementById('ruleta-img');
            const sorteoTxt = document.getElementById('sorteo-txt');

            sorteoOverlay.classList.remove('hidden');

            let vueltas = 0;
