<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Misiones Fotográficas DDT</title>
  
  <!-- Enlace a tu CSS con estilo Neon/Jungle -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==========================================
       1. LANDING PAGE (Pantalla de Inicio)
       ========================================== -->
  <div id="landing" class="landing-page" onclick="iniciarAlbum()">
    <div class="landing-content">
        <h1 class="display-4">Misiones DDT</h1>
        <p class="lead">Completa tu álbum de experiencia.</p>
        <div class="album-icon-container">
            📸 Iniciar
        </div>
        <p style="margin-top: 20px; font-size: 0.8em; color: #888;">
          Agita el teléfono dentro del álbum para una sorpresa.
        </p>
    </div>
  </div>

  <!-- ==========================================
       2. CONTENIDO PRINCIPAL (El Álbum)
       ========================================== -->
  <div id="contenido" class="hidden container">
    <h1 class="text-center">Tu Álbum DDT</h1>
    
    <!-- Aquí el JS inyectará las láminas fotográficas -->
    <div id="laminas" class="grid-row"></div>
    
    <div class="actions">
      <button id="btn-share" class="btn btn-primary" onclick="subirFotosAlServidor()">
        ☁️ Enviar mis fotos 
      </button>
    </div>
  </div>

  <!-- ==========================================
       3. MODAL DE CÁMARA (Captura en vivo)
       ========================================== -->
  <div id="camera-modal" class="modal hidden">
    <div class="modal-content">
      <h5 id="titulo-lamina" class="modal-title"></h5>
      
      <video id="video" autoplay playsinline></video>
      
      <button id="switch-camera" class="btn btn-secondary btn-sm" onclick="cambiarCamara()">
        🔄 Cambiar Cámara
      </button>
      
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="capturarFoto()">📷 Capturar</button>
        <label class="btn btn-outline">
          Galería
          <input type="file" accept="image/*" onchange="subirDesdeGaleria(event)" class="hidden" />
        </label>
      </div>

      <button class="modal-close" onclick="cerrarModal()">&times;</button>
    </div>
  </div>

  <!-- ==========================================
       4. MODAL DE ÉXITO FINAL (Cierre Épico)
       ========================================== -->
  <div id="success-modal" class="modal hidden">
    <div class="modal-content success-content">
      <div class="success-icon">🏆</div>
      <h1 class="modal-title" style="font-size: 1.8rem; text-shadow: 0 0 10px #EC0000;">¡MISIONES COMPLETADAS!</h1>
      <p style="color: #ccc; margin-bottom: 25px;">Tus fotos ya están en la pantalla principal del evento.</p>
      <button class="btn btn-primary" onclick="location.reload()">Empezar Nuevo Álbum</button>
    </div>
  </div>

  <!-- ==========================================
       5. CONFIGURACIÓN DE FIREBASE (DDT Santander)
       ========================================== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    // Tus credenciales originales
    const firebaseConfig = {
      apiKey: "AIzaSyBP5D1AtaIcklOFJiKnEXKilgsz5-363RE",
      authDomain: "veltis-data1.firebaseapp.com",
      projectId: "veltis-data1",
      storageBucket: "veltis-data1.firebasestorage.app", 
      messagingSenderId: "607614671540",
      appId: "1:607614671540:web:8118954f681910ecf995e1"
    };

    // Inicializar app
    const app = initializeApp(firebaseConfig);
    
    // Exportar variables al objeto window para que script.js las pueda usar
    window.db = getFirestore(app);
    window.storage = getStorage(app);
    window.dbCollection = collection;
    window.dbAddDoc = addDoc;
    window.dbTimestamp = serverTimestamp;
    window.sRef = ref;
    window.sUpload = uploadString;
    window.sGetUrl = getDownloadURL;
    
    console.log("🔥 Firebase 10.8.0 conectado. Listo para recibir fotos en 'DDT santander'.");
  </script>

  <!-- ==========================================
       6. TU SCRIPT PRINCIPAL (Lógica, Audio y Sensores)
       ========================================== -->
  <script src="script.js" defer></script>

</body>
</html>
